# ============================================================================
# RunSecure — Lint & Unit Validation
# ============================================================================
# Runs every host-only test in tests/validation/ and tests/unit/ on every
# PR. These tests don't need Docker and finish in well under a minute —
# they're cheap to run on every push and they catch:
#
#   - Workflow YAML errors (the gotcha that broke main once)
#   - Renovate config drift
#   - .grype.yaml allowlist hygiene (every entry must have justification)
#   - Tool-recipe pin format
#   - Compose-file hardening regressions (seccomp, init:true, env scope)
#   - Schema validator behavior (strict-key rejection, IP literal blocks)
#   - Version-bump arithmetic (the weekly auto-release math)
#   - finalize-hardening fail-closed properties
#   - H2 stub/remove behavior
#
# The Docker-required tests (test-tool-recipes.sh, test-hardening-
# idempotency.sh) are run by smoke-test.yml's image-build path instead;
# they would double-run here without adding signal.
# ============================================================================

name: validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lints-and-units:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yq + PyYAML
        run: |
          set -euo pipefail
          # yq v4 (the validator's hard requirement)
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
          # PyYAML for test-workflow-yaml-valid.sh
          python3 -m pip install --quiet pyyaml

      - name: Run validation lints
        run: |
          set -uo pipefail
          FAIL=0
          for t in tests/validation/test-*.sh; do
            [ -f "$t" ] || continue
            # Skip Docker-required tests — those run in smoke-test.yml
            case "$(basename "$t")" in
              test-tool-recipes.sh|test-hardening-idempotency.sh)
                echo "::group::SKIP $t (Docker-only, runs in smoke-test)"
                echo "::endgroup::"
                continue ;;
            esac
            echo "::group::$t"
            if bash "$t"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::$t failed"
              FAIL=$((FAIL + 1))
            fi
          done
          exit "$FAIL"

      - name: Run unit tests
        run: |
          set -uo pipefail
          FAIL=0
          for t in tests/unit/test-*.sh; do
            [ -f "$t" ] || continue
            # Skip Docker-requiring unit tests — they invoke compose-image.sh
            # or generate-egress-conf.sh which trigger image builds. Those
            # belong in smoke-test.yml's image-build path, not in this fast
            # lint workflow.
            case "$(basename "$t")" in
              test-compose-image.sh|test-runner-yml-schema.sh)
                echo "::group::SKIP $t (Docker-only)"
                echo "::endgroup::"
                continue ;;
            esac
            echo "::group::$t"
            if bash "$t"; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::$t failed"
              FAIL=$((FAIL + 1))
            fi
          done
          exit "$FAIL"

  # --------------------------------------------------------------------------
  # Orchestrator + socket-proxy Go build + test + 95% coverage gate.
  # --------------------------------------------------------------------------
  build-orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Build + test
        run: |
          set -euo pipefail
          cd infra/orchestrator
          go test -race -coverpkg=./... -coverprofile=cover.out ./internal/...
      - name: Enforce >=95% coverage
        run: |
          set -euo pipefail
          cd infra/orchestrator
          pct=$(go tool cover -func=cover.out | awk '/total:/{print $3}' | tr -d %)
          echo "orchestrator total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN{ exit !(p >= 95.0) }' \
            || { echo "::error::orchestrator coverage ${pct}% < 95%"; exit 1; }

  build-socket-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Build + test
        run: |
          set -euo pipefail
          cd infra/socket-proxy
          go test -race -coverpkg=./... -coverprofile=cover.out ./internal/...
      - name: Enforce >=95% coverage
        run: |
          set -euo pipefail
          cd infra/socket-proxy
          pct=$(go tool cover -func=cover.out | awk '/total:/{print $3}' | tr -d %)
          echo "socket-proxy total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN{ exit !(p >= 95.0) }' \
            || { echo "::error::socket-proxy coverage ${pct}% < 95%"; exit 1; }
      - name: Fuzz body validator (2 minutes)
        run: |
          set -euo pipefail
          cd infra/socket-proxy
          go test ./internal/proxy/ -run='^$' -fuzz=FuzzValidateContainerCreate -fuzztime=2m

  cornerstone-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Build corner-lint (vendored at tools/corner-lint)
        run: |
          set -euo pipefail
          cd tools/corner-lint
          go build -o /tmp/corner-lint ./cmd/corner-lint
      - name: Validate event registry
        run: |
          set -euo pipefail
          /tmp/corner-lint registry validate .
