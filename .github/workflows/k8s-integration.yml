# ============================================================================
# RunSecure — K8s Integration
# ============================================================================
# Proves the Kubernetes security model on a REAL kind cluster with Calico CNI:
#   1. PSS Restricted admission rejects privileged pods
#   2. NetworkPolicy: runner can ONLY reach its own proxy
#   3. RBAC: least-privilege SA (scoped to namespace)
#   4. Helm: chart template renders + dry-run install succeeds
#
# Cluster lifecycle is owned by tests/integration/k8s/run-k8s-tests.sh.
# kind, kubectl, and helm are installed in pre-steps so the skip-guard in
# the harness never fires; the harness runs for real on every invocation.
# ============================================================================

name: K8s Integration

on:
  pull_request:
    paths:
      - "infra/orchestrator/**"
      - "infra/socket-proxy/**"
      - "charts/**"
      - "tests/integration/k8s/**"
      - ".github/workflows/k8s-integration.yml"
  push:
    paths:
      - "infra/orchestrator/**"
      - "infra/socket-proxy/**"
      - "charts/**"
      - "tests/integration/k8s/**"
      - ".github/workflows/k8s-integration.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  k8s-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Install kind v0.32.0
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kind \
            https://github.com/kubernetes-sigs/kind/releases/download/v0.32.0/kind-linux-amd64
          echo "50030de23cf40a18505f20426f6a8506bedf13c6e509244bd1fa9463721b0f54  /tmp/kind" | sha256sum -c -
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          kind version

      - name: Install kubectl v1.36.2
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kubectl \
            https://dl.k8s.io/release/v1.36.2/bin/linux/amd64/kubectl
          echo "1e9045ec32bea85da43de85f0065358529ea7c7a152eca78154fba5b58c27d82  /tmp/kubectl" | sha256sum -c -
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install helm v3.21.2
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/helm.tar.gz \
            https://get.helm.sh/helm-v3.21.2-linux-amd64.tar.gz
          echo "0a745198de24545d0055cd8414bc8d2ba10363ef5f5d38369ea1b399671cc083  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Run k8s integration tests
        run: |
          set -euo pipefail
          bash tests/integration/k8s/run-k8s-tests.sh

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          set -uo pipefail
          echo "=== kubectl get pods -A ==="
          kubectl get pods -A 2>/dev/null || true
          echo ""
          echo "=== kubectl describe pods -A ==="
          kubectl describe pods -A 2>/dev/null || true
          echo ""
          echo "=== calico-node logs ==="
          kubectl logs -n kube-system -l k8s-app=calico-node --tail=100 2>/dev/null || true
          echo ""
          echo "=== calico-kube-controllers logs ==="
          kubectl logs -n kube-system -l k8s-app=calico-kube-controllers --tail=50 2>/dev/null || true
          echo ""
          echo "=== kind cluster nodes ==="
          kubectl get nodes -o wide 2>/dev/null || true
