# ============================================================================
# RunSecure — Build and Publish Images to GHCR
# ============================================================================
# Triggers on semver tags (v1.0.0, v1.2.3, etc.)
# Builds multi-arch images and pushes to ghcr.io/andend-collective/runsecure/
#
# Image naming (canary-first publish):
#   ghcr.io/andend-collective/runsecure/base:<version>-canary
#   ghcr.io/andend-collective/runsecure/base:nightly
#   ghcr.io/andend-collective/runsecure/<lang>:<version>-canary-<lang_version>
#   ghcr.io/andend-collective/runsecure/<lang>:nightly-<lang_version>
#   ghcr.io/andend-collective/runsecure/proxy:<version>-canary
#   ghcr.io/andend-collective/runsecure/proxy:nightly
#
# Production tags (`<version>` and `latest`) are NOT created here.
# They are added by promote-to-stable.yml after post-publish-acceptance.yml
# validates the canary build against documented security claims. Same
# digest, server-side retag — no rebuild.
# ============================================================================

name: Publish Images

on:
  # Triggered by the weekly version-bump workflow creating a new
  # tag (Mondays 02:30 UTC). Manual tag pushes also trigger this.
  # The schedule trigger that previously ran a no-push rebuild for
  # scanning was removed: the weekly bump now produces a real
  # release every Monday, which fires this workflow in publish mode
  # and gives us rebuild + scan + publish in one path.
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/andend-collective/runsecure

# Default to no permissions — each job declares its own
permissions: {}

jobs:
  # --- Single approval gate + version resolver ------------------------------
  # Every push job (base, proxy, languages) depends on this. The
  # `environment: ghcr-publish` clause forces one human approval per
  # release; the rest of the pipeline runs unattended after that.
  # Version is also computed here so proxy can build in parallel with
  # base instead of waiting on it.
  gate:
    runs-on: ubuntu-latest
    environment: ghcr-publish
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Resolve version (tag → semver; manual dispatch → manual-build)
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # On a tag push, ref_name is "v1.2.3" — strip the v.
          # On a manual workflow_dispatch (no tag), tag the build
          # "manual-build" so it doesn't collide with semver tags.
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-build" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute build metadata (single source of truth for all jobs)
        id: meta
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Approval recorded
        env:
          APPROVER: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "GHCR publish approved by $APPROVER for ref $REF (version $VERSION)"

  # --- Build and push base image (language images depend on it) -------------
  base:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: images/base.Dockerfile
          # Push to GHCR on real semver tag pushes only. Manual dispatch
          # builds locally for the post-build Grype scan (no-cache so
          # Debian package updates are picked up).
          push: ${{ github.event_name == 'push' }}
          no-cache: ${{ github.event_name != 'push' }}
          platforms: linux/amd64,linux/arm64
          # Canary-first publish. Acceptance suite (post-publish-acceptance.yml)
          # validates these tags; on success, promote-to-stable.yml retags
          # the same digest as `<ver>` + `latest`.
          tags: |
            ${{ env.IMAGE_PREFIX }}/base:${{ needs.gate.outputs.version }}-canary
            ${{ env.IMAGE_PREFIX }}/base:nightly
          # Dynamic OCI labels — statics live in the Dockerfile.
          labels: |
            org.opencontainers.image.version=${{ needs.gate.outputs.version }}
            org.opencontainers.image.created=${{ needs.gate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --- Build language images (depend on base for FROM, gate for version) -----
  languages:
    needs: [gate, base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: node
            file: images/node.Dockerfile
            build_arg: NODE_VERSION=24
            lang_version: "24"
          - name: node
            file: images/node.Dockerfile
            build_arg: NODE_VERSION=22
            lang_version: "22"
          - name: python
            file: images/python.Dockerfile
            build_arg: PYTHON_VERSION=3.12
            lang_version: "3.12"
          - name: rust
            file: images/rust.Dockerfile
            build_arg: RUST_VERSION=stable
            lang_version: "stable"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/base
            BASE_TAG=${{ needs.gate.outputs.version }}-canary
            ${{ matrix.build_arg }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.gate.outputs.version }}-canary-${{ matrix.lang_version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:nightly-${{ matrix.lang_version }}
          # Dynamic OCI labels — statics live in the Dockerfile.
          labels: |
            org.opencontainers.image.version=${{ needs.gate.outputs.version }}
            org.opencontainers.image.created=${{ needs.gate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --- Build proxy image (independent of base — runs in parallel) ------------
  proxy:
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: infra/squid
          file: infra/squid/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/proxy:${{ needs.gate.outputs.version }}-canary
            ${{ env.IMAGE_PREFIX }}/proxy:nightly
          # Dynamic OCI labels — statics live in the Dockerfile.
          labels: |
            org.opencontainers.image.version=${{ needs.gate.outputs.version }}
            org.opencontainers.image.created=${{ needs.gate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --- Build orchestrator image (long-running orchestrator) -----------------
  # SECURITY: this job uses only `needs.gate.outputs.*` (job-internal),
  # `github.sha`/`github.actor` (GitHub-trusted), and `secrets.GITHUB_TOKEN`.
  # No untrusted-input vectors (no event.* fields).
  orchestrator:
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: infra/orchestrator
          file: infra/orchestrator/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/orchestrator:${{ needs.gate.outputs.version }}-canary
            ${{ env.IMAGE_PREFIX }}/orchestrator:nightly
          labels: |
            org.opencontainers.image.version=${{ needs.gate.outputs.version }}
            org.opencontainers.image.created=${{ needs.gate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --- Build socket-proxy image (Compose backend) --------------------------
  socket-proxy:
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: infra/socket-proxy
          file: infra/socket-proxy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/socket-proxy:${{ needs.gate.outputs.version }}-canary
            ${{ env.IMAGE_PREFIX }}/socket-proxy:nightly
          labels: |
            org.opencontainers.image.version=${{ needs.gate.outputs.version }}
            org.opencontainers.image.created=${{ needs.gate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --- Post-publish Grype scan: detects known CVEs in the base image ---------
  # Runs after base is published. Fails the workflow if HIGH/CRITICAL CVEs
  # are found WITH a fix available (unfixed CVEs upload to the Security tab
  # but don't block — chasing unfixable issues creates noise).
  #
  # Grype is installed directly (not via anchore/scan-action) because the
  # action wrapper bundles a pinned grype binary that periodically fails
  # with "vulnerability database was built N weeks ago" when the upstream
  # CDN drifts past the pinned grype's tolerance.
  grype-scan:
    needs: [gate, base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype (latest, fresh CVE DB)
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Grype scan (base image) — fail on HIGH/CRITICAL with fix
        # IMAGE_REF is computed in step `env:` rather than job `env:` because
        # job-level env evaluates BEFORE workflow-level env is in scope, so
        # `${{ env.IMAGE_PREFIX }}` resolves empty there. Step-level env is
        # evaluated when the step runs and resolves correctly.
        env:
          IMAGE_REF: "${{ env.IMAGE_PREFIX }}/base:${{ needs.gate.outputs.version }}-canary"
        run: |
          set -euo pipefail
          grype "$IMAGE_REF" --output table --fail-on high --only-fixed \
            || GRYPE_FAILED=1
          grype "$IMAGE_REF" --output sarif --file grype-base.sarif --only-fixed
          if [ "${GRYPE_FAILED:-0}" = "1" ]; then
            echo "::error::Grype found HIGH/CRITICAL vulnerabilities with available fixes in $IMAGE_REF"
            exit 1
          fi

      - name: Upload Grype scan results (base) to GitHub Security
        if: always() && hashFiles('grype-base.sarif') != ''
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: grype-base.sarif
          category: grype-base

  # --- Post-publish Grype scan: proxy image (dnsmasq + haproxy CVEs) ---------
  grype-scan-proxy:
    needs: [gate, proxy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype (latest, fresh CVE DB)
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Grype scan (proxy image) — fail on HIGH/CRITICAL with fix
        env:
          IMAGE_REF: "${{ env.IMAGE_PREFIX }}/proxy:${{ needs.gate.outputs.version }}-canary"
        run: |
          set -euo pipefail
          grype "$IMAGE_REF" --output table --fail-on high --only-fixed \
            || GRYPE_FAILED=1
          grype "$IMAGE_REF" --output sarif --file grype-proxy.sarif --only-fixed
          if [ "${GRYPE_FAILED:-0}" = "1" ]; then
            echo "::error::Grype found HIGH/CRITICAL vulnerabilities with available fixes in $IMAGE_REF"
            exit 1
          fi

      - name: Upload Grype scan results (proxy) to GitHub Security
        if: always() && hashFiles('grype-proxy.sarif') != ''
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: grype-proxy.sarif
          category: grype-proxy

  # --- Post-publish Grype scan: orchestrator image (distroless Go binary) -----
  # The orchestrator is a long-running control-plane binary; CVEs in its Go
  # stdlib/modules (as the gh-stdlib findings showed) must gate the publish.
  grype-scan-orchestrator:
    needs: [gate, orchestrator]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype (latest, fresh CVE DB)
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Grype scan (orchestrator image) — fail on HIGH/CRITICAL with fix
        env:
          IMAGE_REF: "${{ env.IMAGE_PREFIX }}/orchestrator:${{ needs.gate.outputs.version }}-canary"
        run: |
          set -euo pipefail
          grype "$IMAGE_REF" --output table --fail-on high --only-fixed \
            || GRYPE_FAILED=1
          grype "$IMAGE_REF" --output sarif --file grype-orchestrator.sarif --only-fixed
          if [ "${GRYPE_FAILED:-0}" = "1" ]; then
            echo "::error::Grype found HIGH/CRITICAL vulnerabilities with available fixes in $IMAGE_REF"
            exit 1
          fi

      - name: Upload Grype scan results (orchestrator) to GitHub Security
        if: always() && hashFiles('grype-orchestrator.sarif') != ''
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: grype-orchestrator.sarif
          category: grype-orchestrator

  # --- Post-publish Grype scan: socket-proxy image (distroless Go binary) -----
  # socket-proxy is the only component mounting docker.sock; its binary must be
  # CVE-gated like every other published image.
  grype-scan-socket-proxy:
    needs: [gate, socket-proxy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype (latest, fresh CVE DB)
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Grype scan (socket-proxy image) — fail on HIGH/CRITICAL with fix
        env:
          IMAGE_REF: "${{ env.IMAGE_PREFIX }}/socket-proxy:${{ needs.gate.outputs.version }}-canary"
        run: |
          set -euo pipefail
          grype "$IMAGE_REF" --output table --fail-on high --only-fixed \
            || GRYPE_FAILED=1
          grype "$IMAGE_REF" --output sarif --file grype-socket-proxy.sarif --only-fixed
          if [ "${GRYPE_FAILED:-0}" = "1" ]; then
            echo "::error::Grype found HIGH/CRITICAL vulnerabilities with available fixes in $IMAGE_REF"
            exit 1
          fi

      - name: Upload Grype scan results (socket-proxy) to GitHub Security
        if: always() && hashFiles('grype-socket-proxy.sarif') != ''
        uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          sarif_file: grype-socket-proxy.sarif
          category: grype-socket-proxy
