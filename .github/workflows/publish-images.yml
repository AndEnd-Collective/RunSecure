# ============================================================================
# RunSecure — Build and Publish Images to GHCR
# ============================================================================
# Triggers on semver tags (v1.0.0, v1.2.3, etc.)
# Builds multi-arch images and pushes to ghcr.io/andend-collective/runsecure/
#
# Image naming:
#   ghcr.io/andend-collective/runsecure/base:<version>
#   ghcr.io/andend-collective/runsecure/node:<version>-<node_version>
#   ghcr.io/andend-collective/runsecure/python:<version>-<python_version>
#   ghcr.io/andend-collective/runsecure/rust:<version>-<rust_version>
#   ghcr.io/andend-collective/runsecure/proxy:<version>
# ============================================================================

name: Publish Images

on:
  # Triggered by the weekly version-bump workflow creating a new
  # tag (Mondays 02:30 UTC). Manual tag pushes also trigger this.
  # The schedule trigger that previously ran a no-push rebuild for
  # scanning was removed: the weekly bump now produces a real
  # release every Monday, which fires this workflow in publish mode
  # and gives us rebuild + scan + publish in one path.
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/andend-collective/runsecure

# Default to no permissions — each job declares its own
permissions: {}

jobs:
  # --- Build and push base image first (all others depend on it) -------------
  base:
    runs-on: ubuntu-latest
    environment: ghcr-publish
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version (tag → semver; manual dispatch → manual-build)
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # On a tag push, ref_name is "v1.2.3" — strip the v.
          # On a manual workflow_dispatch (no tag), tag the build
          # "manual-build" so it doesn't collide with semver tags.
          if [[ "$EVENT_NAME" == "push" && "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-build" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: images/base.Dockerfile
          # Push to GHCR on real semver tag pushes only. Manual dispatch
          # builds locally for the post-build Grype scan (no-cache so
          # Debian package updates are picked up).
          push: ${{ github.event_name == 'push' }}
          no-cache: ${{ github.event_name != 'push' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/base:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/base:latest
          labels: |
            org.opencontainers.image.source=https://github.com/AndEnd-Collective/RunSecure
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  # --- Build language images (depend on base) --------------------------------
  languages:
    needs: base
    runs-on: ubuntu-latest
    environment: ghcr-publish
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: node
            file: images/node.Dockerfile
            build_arg: NODE_VERSION=24
            lang_version: "24"
          - name: node
            file: images/node.Dockerfile
            build_arg: NODE_VERSION=22
            lang_version: "22"
          - name: python
            file: images/python.Dockerfile
            build_arg: PYTHON_VERSION=3.12
            lang_version: "3.12"
          - name: rust
            file: images/rust.Dockerfile
            build_arg: RUST_VERSION=stable
            lang_version: "stable"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/base
            BASE_TAG=${{ needs.base.outputs.version }}
            ${{ matrix.build_arg }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ needs.base.outputs.version }}-${{ matrix.lang_version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest-${{ matrix.lang_version }}
          labels: |
            org.opencontainers.image.source=https://github.com/AndEnd-Collective/RunSecure
            org.opencontainers.image.version=${{ needs.base.outputs.version }}

  # --- Build proxy image (independent of base) -------------------------------
  proxy:
    runs-on: ubuntu-latest
    needs: base
    environment: ghcr-publish
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: infra/squid
          file: infra/squid/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/proxy:${{ needs.base.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/proxy:latest
          labels: |
            org.opencontainers.image.source=https://github.com/AndEnd-Collective/RunSecure
            org.opencontainers.image.version=${{ needs.base.outputs.version }}

  # --- Post-publish Grype scan: detects known CVEs in the base image ---------
  # Runs after base is published. Fails the workflow if HIGH/CRITICAL CVEs
  # are found WITH a fix available (unfixed CVEs upload to the Security tab
  # but don't block — chasing unfixable issues creates noise). Both image-
  # and Dockerfile-level scans are produced; SARIF lands in the GitHub
  # Security tab under the matching category.
  grype-scan:
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Grype scan (base image) — fail on HIGH/CRITICAL with fix
        id: grype_base
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a # v6.6.0
        with:
          image: "${{ env.IMAGE_PREFIX }}/base:${{ needs.base.outputs.version }}"
          severity-cutoff: high
          only-fixed: true
          fail-build: true
          output-format: sarif

      - name: Upload Grype scan results (base) to GitHub Security
        if: always() && steps.grype_base.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3
        with:
          sarif_file: ${{ steps.grype_base.outputs.sarif }}
          category: grype-base

  # --- Post-publish Grype scan: proxy image (dnsmasq + haproxy CVEs) ---------
  grype-scan-proxy:
    needs: [proxy, base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Grype scan (proxy image) — fail on HIGH/CRITICAL with fix
        id: grype_proxy
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a # v6.6.0
        with:
          image: "${{ env.IMAGE_PREFIX }}/proxy:${{ needs.base.outputs.version }}"
          severity-cutoff: high
          only-fixed: true
          fail-build: true
          output-format: sarif

      - name: Upload Grype scan results (proxy) to GitHub Security
        if: always() && steps.grype_proxy.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3
        with:
          sarif_file: ${{ steps.grype_proxy.outputs.sarif }}
          category: grype-proxy
