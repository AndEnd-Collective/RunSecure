# ============================================================================
# RunSecure — Integration Test Compose
# ============================================================================
# Launches Squid proxy + runner container on an isolated network for testing.
# No JIT token required — the runner container just runs test scripts.
#
# Additional fixture services for TCP egress + DNS tests:
#   postgres-test   — PostgreSQL server for TCP egress tests
#   mock-tcp        — Simple TCP echo service for HAProxy tests
#   mock-dns        — dnsmasq-based mock DNS server for DNS tests
#   url-server      — Static HTTP server for hosts_file/whitelist_file fetch tests
# ============================================================================

services:
  proxy:
    build:
      context: ../../infra/squid
      dockerfile: Dockerfile
    container_name: runsecure-test-proxy
    init: true
    volumes:
      - ${SQUID_CONF:-../../infra/squid/base.conf}:/etc/squid/squid.conf:ro
    networks:
      test-net:
        ipv4_address: 10.11.12.13
        aliases:
          - proxy
      proxy-external: {}
    healthcheck:
      test: ["CMD-SHELL", "squid -k check -f /etc/squid/squid.conf || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256m
          pids: 32

  runner:
    image: ${RUNNER_IMAGE:-runner-node:24}
    container_name: runsecure-test-runner
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      - HTTP_PROXY=http://proxy:3128
      - HTTPS_PROXY=http://proxy:3128
      - http_proxy=http://proxy:3128
      - https_proxy=http://proxy:3128
      - NO_PROXY=localhost,127.0.0.1,proxy
      - no_proxy=localhost,127.0.0.1,proxy
    volumes:
      - ../../tests:/mnt/tests:ro
      - ../../infra:/mnt/infra:ro
    entrypoint: ["bash", "/mnt/tests/integration/${TEST_SCRIPT:-test-egress-proxy.sh}"]

    # --- Hardening (matches production) ---
    user: "1001:0"
    security_opt:
      - no-new-privileges:true
      - seccomp:../../infra/seccomp/node-runner.json
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=2g,uid=1001,gid=0
    mem_limit: 4g
    cpus: 2
    pids_limit: 512
    networks:
      - test-net

  # --- PostgreSQL: TCP egress target fixture ----------------------------------
  # Used by test-tcp-egress.sh to verify HAProxy can proxy TCP to a real server.
  postgres-test:
    image: postgres:15-alpine
    container_name: runsecure-test-postgres
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_DB=testdb
    networks:
      proxy-external: {}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128m
          pids: 32

  # --- Mock TCP service: lightweight TCP echo fixture -------------------------
  # Used by test-tcp-egress.sh to verify basic TCP passthrough via HAProxy.
  # socat is used instead of "nc -e" because alpine's OpenBSD netcat does not
  # support -e; socat is portable and available via apk.
  mock-tcp:
    image: alpine:3.20
    container_name: runsecure-test-mock-tcp
    command: ["sh", "-c", "apk add --no-cache socat && socat -v TCP-LISTEN:9999,fork,reuseaddr SYSTEM:'echo PONG'"]
    networks:
      proxy-external:
        aliases:
          - mock-tcp
    deploy:
      resources:
        limits:
          memory: 32m
          pids: 8

  # --- Mock DNS server: dnsmasq-based DNS fixture ----------------------------
  # Used by test-dns-validation.sh to verify dnsmasq responds to queries.
  mock-dns:
    build:
      context: ../../tests/fixtures/mock-dns
      dockerfile: Dockerfile
    container_name: runsecure-test-mock-dns
    networks:
      proxy-external:
        aliases:
          - mock-dns
    deploy:
      resources:
        limits:
          memory: 32m
          pids: 8

  # --- URL server: static file server for hosts_file/whitelist_file ----------
  # Serves test fixtures over HTTP for fetch-runtime-file.sh tests.
  url-server:
    image: nginx:alpine
    container_name: runsecure-test-url-server
    volumes:
      - ../../tests/fixtures/url-server:/usr/share/nginx/html:ro
    networks:
      proxy-external:
        aliases:
          - url-server
    deploy:
      resources:
        limits:
          memory: 32m
          pids: 8

networks:
  test-net:
    internal: true
    ipam:
      config:
        - subnet: 10.11.12.0/24
          ip_range: 10.11.12.96/28
  proxy-external:
    driver: bridge
