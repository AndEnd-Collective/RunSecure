# Proxy Service — matches ProxyService() builder output:
#   name: rs-proxy-svc-<spawnID>  →  rs-proxy-svc-spawn01
#   namespace: runsecure-itest
#   selector: runsecure.io/role=proxy, runsecure.io/spawn-id=spawn01
#   port: 3128/TCP (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: rs-proxy-svc-spawn01
  namespace: runsecure-itest
  labels:
    runsecure.io/scope: itest
    runsecure.io/repo: test_repo
    runsecure.io/spawn-id: spawn01
    runsecure.io/role: proxy
spec:
  type: ClusterIP
  selector:
    runsecure.io/role: proxy
    runsecure.io/spawn-id: spawn01
  ports:
    - name: squid
      protocol: TCP
      port: 3128
      targetPort: 3128
