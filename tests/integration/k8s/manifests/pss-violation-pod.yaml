# PSS violation test pod — should be REJECTED by admission when applied to
# runsecure-itest (which has pod-security.kubernetes.io/enforce=restricted).
# This pod violates PSS Restricted via privileged=true and runAsUser=0.
apiVersion: v1
kind: Pod
metadata:
  name: pss-violation-test
  namespace: runsecure-itest
spec:
  restartPolicy: Never
  containers:
    - name: evil
      image: busybox:1.37.0
      command: ["sleep", "10"]
      securityContext:
        privileged: true
        runAsUser: 0
