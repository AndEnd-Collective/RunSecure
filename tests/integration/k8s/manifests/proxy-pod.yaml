# Proxy pod — matches ProxyPod() builder output:
#   name: rs-proxy-<spawnID>  →  rs-proxy-spawn01
#   namespace: runsecure-itest
#   labels: runsecure.io/role=proxy, runsecure.io/scope=itest, runsecure.io/spawn-id=spawn01
#
# Uses busybox with nc as a minimal HTTP listener on 3128.
# PSS Restricted: runAsNonRoot, runAsUser=1001, seccompProfile RuntimeDefault,
#   allowPrivilegeEscalation=false, drop ALL caps, readOnlyRootFilesystem=true.
# EmptyDir /tmp for writable tmpfs (readOnlyRootFilesystem=true requires it).
apiVersion: v1
kind: Pod
metadata:
  name: rs-proxy-spawn01
  namespace: runsecure-itest
  labels:
    runsecure.io/scope: itest
    runsecure.io/repo: test_repo
    runsecure.io/spawn-id: spawn01
    runsecure.io/role: proxy
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  hostNetwork: false
  hostPID: false
  hostIPC: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: tmp
      emptyDir:
        medium: Memory
  containers:
    - name: proxy
      # nc -lk -p 3128: listen on 3128, keep accepting connections (-k), respond 200
      # The -e sh allows sending a minimal HTTP response so wget sees a 200.
      image: busybox:1.37.0
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          while true; do
            echo -e 'HTTP/1.1 200 OK\r\nContent-Length: 2\r\nConnection: close\r\n\r\nOK' \
              | nc -l -p 3128 || true
          done
      ports:
        - name: squid
          containerPort: 3128
          protocol: TCP
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: tmp
          mountPath: /tmp
