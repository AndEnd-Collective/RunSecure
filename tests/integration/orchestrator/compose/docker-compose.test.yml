# Integration test stack for the orchestrator.
#
# Three containers:
#   mock-github  — stub GitHub API server controlled via MOCK_* env vars
#   socket-proxy — production socket-proxy image (built local)
#   orchestrator — production orchestrator image (built local)
#
# All on a shared private network with internal=false so the orchestrator
# can reach the mock; the production stack uses internal=true for the
# orchestrator's own network, but tests need to talk to the mock.

services:
  mock-github:
    build: ./mock-github
    image: runsecure-mock-github:test
    container_name: rs-test-mock-github
    networks: [test-net]
    environment:
      MOCK_LISTEN: ":80"
      MOCK_QUEUED_OWNER_REPO: "${MOCK_QUEUED_OWNER_REPO:-0}"
      MOCK_AUTH_FAIL: "${MOCK_AUTH_FAIL:-}"
      MOCK_JIT_FAIL: "${MOCK_JIT_FAIL:-}"
      MOCK_RATE_LIMIT: "${MOCK_RATE_LIMIT:-}"

  socket-proxy:
    image: runsecure-socket-proxy:local
    container_name: rs-test-socket-proxy
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    # Runs as root inside the container to read /var/run/docker.sock
    # (Docker Desktop / Colima own the socket root:root mode 600).
    # Strictness preserved by cap_drop + no-new-privileges + read_only.
    user: "0:0"
    networks: [test-net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Bug #5 fix: bind-mount the test allowlist over the baked-in empty
      # file so socket-proxy will accept spawns of the test-runner image.
      - ./testdata/allowed-images.txt:/etc/runsecure/socket-proxy/allowed-images.txt:ro
    environment:
      RUNSECURE_DOCKER_SOCK: /var/run/docker.sock
      RUNSECURE_LISTEN_ADDR: ":2375"
      RUNSECURE_ALLOWED_IMAGES_FILE: /etc/runsecure/socket-proxy/allowed-images.txt
      # Egress-network gate (Task 7/10): the socket-proxy reads this at startup to
      # activate the runner→egress isolation gate. Must match the orchestrator's
      # RUNSECURE_EGRESS_NETWORK so the gate fires on the correct network name.
      RUNSECURE_EGRESS_NETWORK: "${RUNSECURE_EGRESS_NETWORK:-runsecure-egress}"
      # Egress-volume gate (Task 12): only role=proxy may mount this named volume.
      # Must match the orchestrator's RUNSECURE_EGRESS_VOLUME.
      RUNSECURE_EGRESS_VOLUME: "runsecure-egress-configs"

  egress-init:
    # One-shot container that sets the ownership of the shared egress-configs
    # volume root to UID 65532 (the orchestrator's non-root user). Docker
    # always creates named volume roots as root:root 755; without this step
    # the orchestrator cannot create per-spawn subdirs and every spawn fails
    # with egress_render / "permission denied".
    # CAP_CHOWN is required to change file ownership; it is dropped after
    # this service exits and is never present in the long-running services.
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    container_name: rs-test-egress-init
    restart: "no"
    user: "0:0"
    entrypoint: ["chown", "65532:65532", "/data"]
    volumes:
      - egress-configs:/data
    security_opt: ["no-new-privileges:true"]

  pat-init:
    # One-shot container that copies the test PAT from the host bind-mount into
    # a named volume and sets ownership to UID 65532 at mode 0400. This is
    # required because on native-Linux CI, a host file owned by the CI user at
    # mode 0400 is unreadable by UID 65532 (distroless nonroot inside the
    # orchestrator). Named-volume delivery avoids the host-ownership problem:
    # the init runs as root and writes the secret into the volume with the
    # correct uid/mode before the orchestrator starts.
    # CAP_CHOWN is required to change file ownership; dropped when this exits.
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    container_name: rs-test-pat-init
    restart: "no"
    user: "0:0"
    entrypoint:
      - sh
      - -euc
      - |
        cp /host-pat /secret/runsecure-pat
        chown 65532:65532 /secret/runsecure-pat
        chmod 400 /secret/runsecure-pat
    volumes:
      - ./testdata/pat:/host-pat:ro
      - pat-secret:/secret
    security_opt: ["no-new-privileges:true"]

  orchestrator:
    image: runsecure-orchestrator:local
    container_name: rs-test-orchestrator
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    user: "65532:65532"
    networks: [test-net]
    depends_on:
      mock-github:
        condition: service_started
      socket-proxy:
        condition: service_started
      egress-init:
        condition: service_completed_successfully
      pat-init:
        condition: service_completed_successfully
    environment:
      RUNSECURE_SCOPE_FILE: /etc/runsecure/scope.yml
      DOCKER_HOST: "tcp://socket-proxy:2375"
      # Point the github client at the mock instead of api.github.com.
      RUNSECURE_GITHUB_BASE_URL: "http://mock-github:80"
      # Test runner image — must match the digest in allowed-images.txt.
      # _lib.sh's ensure_test_allowlist() resolves the digest and writes
      # it to testdata/allowed-images.txt before each test.
      RUNSECURE_RUNNER_IMAGE_DEFAULT: "${RUNSECURE_TEST_RUNNER_REF:-runsecure-test-runner:local}"
      RUNSECURE_PROXY_IMAGE: "${RUNSECURE_TEST_PROXY_REF:-runsecure-test-runner:local}"
      # Egress network for per-spawn proxy containers. Set by stack_up_real_proxy
      # to "spawn-egress" so the orchestrator attaches the proxy to the network
      # that carries a test-backend container for TCP egress checks.
      RUNSECURE_EGRESS_NETWORK: "${RUNSECURE_EGRESS_NETWORK:-runsecure-egress}"
      # Per-spawn egress configs are written here (onto the shared named volume)
      # and mounted read-only into each proxy at the same path.
      RUNSECURE_EGRESS_BASE_DIR: /var/run/runsecure/egress
      RUNSECURE_EGRESS_VOLUME: "runsecure-egress-configs"
    volumes:
      - ./testdata/scope.yml:/etc/runsecure/scope.yml:ro
      # PAT delivered via named volume (owned 65532:65532, mode 0400).
      # See pat-init service above; named volume works on both native-Linux CI
      # and Colima/Docker Desktop without host uid-remapping dependency.
      - pat-secret:/run/secrets:ro
      - ./testdata/proj:/projects/proj:ro
      # Shared egress-configs volume: orchestrator writes per-spawn configs (rw);
      # the daemon mounts the same volume read-only into each proxy container.
      - egress-configs:/var/run/runsecure/egress:rw
    ports:
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:18081:8081"
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m

volumes:
  egress-configs:
    name: runsecure-egress-configs
  pat-secret:

networks:
  test-net:
    driver: bridge
