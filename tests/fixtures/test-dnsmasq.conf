# Test fixture for DNS validation tests.
# Provides:
#   - Static A records for tcp_egress hostnames (postgres-test, mock-tcp)
#   - One custom hosts_file entry: test-service.internal.example.com -> 192.0.2.10
#   - Forward everything else to upstream public DNS

no-resolv
no-poll
listen-address=0.0.0.0
port=53

stop-dns-rebind
rebind-localhost-ok

# Static A records — tcp_egress hostnames resolve to proxy IP
address=/postgres-test/10.11.12.13
address=/mock-tcp/10.11.12.13

# Custom hosts entries (simulating dns.hosts_file)
address=/test-service.internal.example.com/192.0.2.10

# Upstream resolvers
server=1.1.1.1
server=8.8.8.8

# Log queries to proxy-side diag dir (host volume not mounted in test compose;
# this just goes to stderr inside the container)
log-queries
log-facility=-
