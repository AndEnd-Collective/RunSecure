global
    log stdout format raw local0
    daemon
    maxconn 1024

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30m
    timeout server  30m

resolvers default_dns
    nameserver dnsmasq 127.0.0.1:53
    parse-resolv-conf
    hold valid    10s
    hold nx       10s
    hold timeout  10s
    hold refused  10s

# Forward proxy:5432 → postgres-test:5432
frontend tcp_5432
    bind 10.11.12.13:5432
    default_backend tcp_5432_be

backend tcp_5432_be
    server up postgres-test:5432 resolvers default_dns init-addr none

# Forward proxy:9999 → mock-tcp:9999
frontend tcp_9999
    bind 10.11.12.13:9999
    default_backend tcp_9999_be

backend tcp_9999_be
    server up mock-tcp:9999 resolvers default_dns init-addr none
