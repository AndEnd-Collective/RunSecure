{{/*
ServiceAccount for the orchestrator.
automountServiceAccountToken is explicitly set to false at the SA level;
it is re-enabled selectively on the Deployment pod spec so the orchestrator
can reach the kube-apiserver (needed for pod/service/secret management).
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "runsecure-orchestrator.serviceAccountName" . }}
  namespace: {{ include "runsecure-orchestrator.namespace" . }}
  labels:
    {{- include "runsecure-orchestrator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Default false; the Deployment explicitly opts in to automount so the
# orchestrator pod (and ONLY the orchestrator pod) gets the SA token.
automountServiceAccountToken: false
