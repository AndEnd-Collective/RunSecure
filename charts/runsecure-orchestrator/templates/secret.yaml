{{/*
PAT Secret — rendered ONLY when:
  auth.type == "pat"
  AND auth.pat.existingSecretName is empty (no pre-existing secret referenced)
  AND auth.pat.value is non-empty (an inline value was provided)

Never inline a real PAT here in production. Use auth.pat.existingSecretName
to reference a Secret provisioned out-of-band (e.g. via Sealed Secrets,
External Secrets Operator, or Vault Agent).

The key 'pat' maps to the path /run/secrets/runsecure-pat which the
orchestrator reads (mirrors scope.auth.pat_file in the scope config).
*/}}
{{- if and (eq .Values.auth.type "pat") (not .Values.auth.pat.existingSecretName) .Values.auth.pat.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "runsecure-orchestrator.patSecretName" . }}
  namespace: {{ include "runsecure-orchestrator.namespace" . }}
  labels:
    {{- include "runsecure-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  pat: {{ .Values.auth.pat.value | quote }}
{{- end }}
