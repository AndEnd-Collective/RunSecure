# ============================================================================
# RunSecure — Docker Compose: Runner + Egress Proxy
# ============================================================================
# Launches an ephemeral runner container on an isolated network, with all
# outbound traffic routed through a Squid proxy that enforces an allowlist.
#
# Usage (called by orchestrator, not directly):
#   RUNNER_IMAGE=runner-node:24 RUNNER_JIT_CONFIG=... docker compose up --abort-on-container-exit
# ============================================================================

services:
  # --- Squid egress proxy ---------------------------------------------------
  proxy:
    image: ${PROXY_IMAGE:-ghcr.io/andend-collective/runsecure/proxy:latest}
    container_name: ${RUNNER_NAME:-runsecure}-proxy
    init: true
    restart: "no"
    volumes:
      - ./squid/runtime.conf:/etc/squid/squid.conf:ro
      - squid-ssl:/etc/squid/ssl:ro
    networks:
      runner-net:
        ipv4_address: 10.11.12.13
        aliases:
          - proxy
      proxy-external: {}
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "squid -k check -f /etc/squid/squid.conf || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

    # --- Hardening: proxy container ---
    # NET_BIND_SERVICE is needed for dnsmasq (port 53) and for any tcp_egress
    # port below 1024 that haproxy may need to bind.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
      # M5: apply the same syscall allowlist as the runner. The profile
      # is permissive enough to support squid/dnsmasq/haproxy and tightens
      # the proxy's syscall surface from the unrestricted Docker default.
      - seccomp:../infra/seccomp/node-runner.json
    deploy:
      resources:
        limits:
          memory: 512m
          pids: 64

  # --- Ephemeral runner ------------------------------------------------------
  runner:
    image: ${RUNNER_IMAGE:-runner-base:latest}
    container_name: ${RUNNER_NAME:-runsecure-runner}
    # H3: init: true gives the container a tini PID 1 so the entrypoint
    # shell doesn't have to reap children. The actions-runner forks
    # Worker.exe processes and short-lived shell helpers; without an
    # init those can become zombies that pile up against the pids limit
    # for long jobs. tini also forwards SIGTERM cleanly so the
    # entrypoint's log-upload wait actually runs to completion when the
    # orchestrator stops the container.
    init: true
    restart: "no"
    depends_on:
      proxy:
        condition: service_healthy

    # --- JIT config and proxy routing ---
    # M13: emit BOTH upper- and lower-case proxy env vars. Most CLI
    # tools honour both forms, but a stubborn minority (curl when used
    # without --proxy, some Python libs that consult lowercase only,
    # apt under specific configurations) only read one. Setting both
    # avoids a subset of jobs silently bypassing the proxy because of
    # case-sensitivity quirks.
    environment:
      - RUNNER_JIT_CONFIG=${RUNNER_JIT_CONFIG}
      - HTTP_PROXY=http://proxy:3128
      - HTTPS_PROXY=http://proxy:3128
      - NO_PROXY=localhost,127.0.0.1
      - http_proxy=http://proxy:3128
      - https_proxy=http://proxy:3128
      - no_proxy=localhost,127.0.0.1
      - RUNNER_NAME=${RUNNER_NAME:-runsecure-ephemeral}
      - SEMGREP_SETTINGS_FILE=/home/runner/.semgrep/settings.yml
      - SEMGREP_VERSION_CACHE_PATH=/home/runner/.semgrep/versions

    # --- Entrypoint ---
    entrypoint: ["/home/runner/entrypoint.sh"]
    volumes:
      - ../infra/scripts/entrypoint.sh:/home/runner/entrypoint.sh:ro

    # --- Hardening: user and privileges ---
    user: "1001:0"
    security_opt:
      - no-new-privileges:true
      - seccomp:../infra/seccomp/node-runner.json
    cap_drop:
      - ALL

    # --- Hardening: filesystem ---
    # /tmp is noexec to block downloaded malware execution.
    # The runner writes to its own directory and _work — no read-only root
    # because the GH Actions runner needs to write config, diag logs, and
    # download actions into its install directory at runtime.
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=2g

    # --- Hardening: resources ---
    deploy:
      resources:
        limits:
          memory: ${RUNNER_MEMORY:-8g}
          cpus: "${RUNNER_CPUS:-4}"
          pids: ${RUNNER_PIDS:-2048}
        reservations:
          memory: 1g
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
      nproc:
        soft: 2048
        hard: 2048

    # --- Hardening: network (isolated, proxy-only) ---
    networks:
      - runner-net
    dns: []

# --- Isolated network --------------------------------------------------------
# runner-net is internal: true — the runner has NO direct internet route.
# Only the proxy has dual-network membership (runner-net + proxy-external),
# making Squid a mandatory network gateway, not an optional application proxy.
#
# IPAM subnet 10.11.12.0/24: proxy always at 10.11.12.13 (static IP).
# ip_range 10.11.12.96/28 reserves .96-.111 for dynamic runner containers.
networks:
  runner-net:
    internal: true
    ipam:
      config:
        - subnet: 10.11.12.0/24
          ip_range: 10.11.12.96/28
  proxy-external:
    driver: bridge

# --- Named volumes -----------------------------------------------------------
volumes:
  squid-ssl:
    driver: local
