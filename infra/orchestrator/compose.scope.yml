# RunSecure orchestrator — per-scope compose stack.
#
# Usage:
#   export RUNSECURE_SCOPE=datacentric
#   docker compose -f infra/orchestrator/compose.scope.yml \
#     --env-file infra/orchestrator/scopes/datacentric.env up -d
#
# Three containers per stack:
#   - orchestrator: distroless Go binary; polls GitHub, spawns runners via socket-proxy
#   - socket-proxy: distroless Go binary; the ONLY thing mounting docker.sock
#   - orch-egress:  the orchestrator's only outbound HTTP path (api.github.com allowlist)
services:
  socket-proxy:
    image: ${RUNSECURE_SOCKET_PROXY_IMAGE}
    container_name: rs-orch-${RUNSECURE_SCOPE}-socket-proxy
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    # Runs as root inside the container to read /var/run/docker.sock
    # (which Docker Desktop / Colima own as root:root mode 600). Strictness
    # preserved by cap_drop:ALL + no-new-privileges + read_only rootfs.
    user: "0:0"
    networks: [orch-internal]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      RUNSECURE_DOCKER_SOCK: /var/run/docker.sock
      RUNSECURE_LISTEN_ADDR: ":2375"
      RUNSECURE_ALLOWED_IMAGES_FILE: /etc/runsecure/socket-proxy/allowed-images.txt
      RUNSECURE_EGRESS_NETWORK: ${RUNSECURE_SCOPE}-spawn-egress
      # Egress-volume gate: only role=proxy may mount this named volume.
      RUNSECURE_EGRESS_VOLUME: ${RUNSECURE_SCOPE}-egress-configs

  orch-egress:
    image: ${RUNSECURE_PROXY_IMAGE}
    container_name: rs-orch-${RUNSECURE_SCOPE}-egress
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    networks:
      orch-internal:
      orch-external:

  egress-init:
    # One-shot container that sets the ownership of the shared egress-configs
    # volume root to UID 65532 (the orchestrator's non-root user). Docker
    # always creates named volume roots as root:root 755; without this step
    # the orchestrator cannot create per-spawn subdirs and every spawn fails
    # with egress_render / "permission denied".
    # CAP_CHOWN is required to change file ownership; it is dropped after
    # this service exits and is never present in the long-running services.
    image: alpine:3.22
    container_name: rs-orch-${RUNSECURE_SCOPE}-egress-init
    restart: "no"
    user: "0:0"
    entrypoint: ["chown", "65532:65532", "/data"]
    volumes:
      - egress-configs:/data
    security_opt: ["no-new-privileges:true"]

  orchestrator:
    image: ${RUNSECURE_ORCHESTRATOR_IMAGE}
    container_name: rs-orch-${RUNSECURE_SCOPE}
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    user: "65532:65532"
    networks: [orch-internal]
    depends_on:
      socket-proxy:
        condition: service_started
      orch-egress:
        condition: service_started
      egress-init:
        condition: service_completed_successfully
    environment:
      RUNSECURE_SCOPE_FILE: /etc/runsecure/scope.yml
      DOCKER_HOST: "tcp://socket-proxy:2375"
      HTTP_PROXY: "http://orch-egress:3128"
      HTTPS_PROXY: "http://orch-egress:3128"
      NO_PROXY: "localhost,socket-proxy"
      RUNSECURE_PROXY_IMAGE: ${RUNSECURE_PROXY_IMAGE}
      RUNSECURE_RUNNER_IMAGE_DEFAULT: ${RUNSECURE_RUNNER_IMAGE_DEFAULT}
      RUNSECURE_RUNNER_IMAGE_NODE: ${RUNSECURE_RUNNER_IMAGE_NODE:-}
      RUNSECURE_RUNNER_IMAGE_PYTHON: ${RUNSECURE_RUNNER_IMAGE_PYTHON:-}
      RUNSECURE_RUNNER_IMAGE_RUST: ${RUNSECURE_RUNNER_IMAGE_RUST:-}
      RUNSECURE_EGRESS_NETWORK: ${RUNSECURE_SCOPE}-spawn-egress
      # Per-spawn egress configs are written here (onto the shared named volume)
      # and mounted read-only into each proxy at the same path.
      RUNSECURE_EGRESS_BASE_DIR: /var/run/runsecure/egress
      RUNSECURE_EGRESS_VOLUME: ${RUNSECURE_SCOPE}-egress-configs
    volumes:
      - ./scopes/${RUNSECURE_SCOPE}.yml:/etc/runsecure/scope.yml:ro
      - ${RUNSECURE_PAT_FILE}:/run/secrets/runsecure-pat:ro
      # Shared egress-configs volume: orchestrator writes per-spawn configs (rw);
      # the daemon mounts the same volume read-only into each proxy container.
      - egress-configs:/var/run/runsecure/egress:rw
      # Add per-repo project bindings here, e.g.:
      # - /Users/foo/Code/datacentric:/projects/datacentric:ro
    ports:
      # Localhost-only by design — never publish externally.
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
    tmpfs:
      - /tmp:noexec,nosuid,nodev,size=64m

volumes:
  egress-configs:
    name: ${RUNSECURE_SCOPE}-egress-configs

networks:
  orch-internal:
    driver: bridge
    internal: true       # orchestrator + socket-proxy have NO host egress
  orch-external:
    driver: bridge       # orch-egress's external interface (host-routable)
  spawn-egress:
    name: ${RUNSECURE_SCOPE}-spawn-egress
    driver: bridge
    driver_opts:
      # Disable inter-container communication so that proxy containers from
      # different spawns cannot reach each other — only the gateway is reachable.
      com.docker.network.bridge.enable_icc: "false"
    # NOT internal: this network provides outbound internet access for the
    # per-spawn proxy containers.
