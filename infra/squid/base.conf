# ============================================================================
# RunSecure — Squid Egress Proxy Configuration
# ============================================================================
# This is the BASE allowlist applied to all projects. Project-specific domains
# are appended at runtime by the orchestrator (generate-squid-conf.sh).
#
# Policy: DENY ALL except explicitly allowed domains.
# ============================================================================

# --- Core settings ---
http_port 3128
access_log /var/log/squid/access.log
cache deny all
forwarded_for delete
via off

# --- SSL bump for HTTPS filtering ---
# We use ssl_bump peek + splice so Squid inspects the SNI (domain) in the TLS
# ClientHello without decrypting the traffic. No MITM, no CA injection.
http_port 3129 intercept
https_port 3130 intercept ssl-bump \
    cert=/etc/squid/ssl/squid-ca-cert.pem \
    key=/etc/squid/ssl/squid-ca-key.pem

acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump splice all

# --- DNS ---
dns_nameservers 8.8.8.8 8.8.4.4

# --- Allowed domains: GitHub core ---
acl github_core dstdomain .github.com
acl github_core dstdomain .api.github.com
acl github_core dstdomain .githubusercontent.com
acl github_core dstdomain .actions.githubusercontent.com
acl github_core dstdomain .objects.githubusercontent.com
acl github_core dstdomain .github.githubassets.com
acl github_core dstdomain .ghcr.io
acl github_core dstdomain .pkg.github.com
acl github_core dstdomain .pipelines.actions.githubusercontent.com
acl github_core dstdomain .results-receiver.actions.githubusercontent.com
acl github_core dstdomain .vstoken.actions.githubusercontent.com

# --- Allowed domains: package registries ---
acl registries dstdomain .registry.npmjs.org
acl registries dstdomain .pypi.org
acl registries dstdomain .files.pythonhosted.org
acl registries dstdomain .crates.io
acl registries dstdomain .static.crates.io
acl registries dstdomain .index.crates.io

# --- Allowed domains: common CI tools ---
acl ci_tools dstdomain .nodejs.org
acl ci_tools dstdomain .deb.nodesource.com
acl ci_tools dstdomain .playwright.azureedge.net
acl ci_tools dstdomain .storage.googleapis.com
acl ci_tools dstdomain .dl.google.com
acl ci_tools dstdomain .app.semgrep.dev
acl ci_tools dstdomain .semgrep.dev
acl ci_tools dstdomain .sh.rustup.rs
acl ci_tools dstdomain .static.rust-lang.org

# --- Project-specific domains (appended by orchestrator) ---
# RUNSECURE_PROJECT_EGRESS_START
# Project-specific domains are inserted here by generate-squid-conf.sh
# RUNSECURE_PROJECT_EGRESS_END

# --- Allow CONNECT method for HTTPS ---
acl SSL_ports port 443
acl CONNECT method CONNECT
http_access allow CONNECT SSL_ports github_core
http_access allow CONNECT SSL_ports registries
http_access allow CONNECT SSL_ports ci_tools

# --- Apply access rules ---
http_access allow github_core
http_access allow registries
http_access allow ci_tools

# --- DENY everything else ---
http_access deny all
