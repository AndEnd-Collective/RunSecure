# ============================================================================
# RunSecure — Runner Configuration
# ============================================================================
# Copy this file to: .github/runner.yml in your project.
#
# This file tells RunSecure how to build and run your CI container.
# Only the 'runtime' field is required. Everything else has sensible defaults.
#
# Docs: https://github.com/AndEnd-Collective/RunSecure#configuration
# ============================================================================

# OPTIONAL: Pin to a RunSecure release version.
# When set, the orchestrator pulls pre-built images from GHCR instead of
# building locally. Use a semver version (no "v" prefix).
# Omit to build images from local Dockerfiles.
# version: "1.0.0"

# REQUIRED: Language runtime and version
# Options: node:22, node:24, python:3.11, python:3.12, rust:stable
runtime: node:24

# OPTIONAL: CI tools to bake into the image
# Available: playwright, semgrep, cypress
# These are installed on top of the language layer and cached in the image.
# tools:
#   - playwright
#   - semgrep

# OPTIONAL: Extra system packages (installed via apt)
# apt:
#   - libvips-dev
#   - ffmpeg

# OPTIONAL: Extra HTTP/HTTPS domains allowed through the egress proxy.
# The base allowlist (GitHub, npm, PyPI, crates.io) is always included.
# Use ".domain.com" to allow all subdomains.
# http_egress:
#   - ".neon.tech"
#   - "api.vercel.com"
#   - ".amazonaws.com"

# OPTIONAL: Raw TCP egress for database clients and other TCP-only protocols.
# Each entry is host:port. Each port must be unique (HAProxy frontend per port).
# Ports 80 and 443 are reserved for HTTP/HTTPS — use http_egress instead.
# tcp_egress:
#   - ep-foo.neon.tech:5432       # Neon Postgres
#   - redis.internal.company.com:6379

# OPTIONAL: DNS configuration.
# By default (absent or host: true), the runner uses the Docker host DNS.
# Set host: false to use an isolated dnsmasq instance inside the proxy
# container. This prevents DNS-based leakage to the host resolver.
#
# When host: false, you must provide either 'servers' or 'hosts_file'.
# dns:
#   host: false
#   servers:
#     - 10.0.0.53            # Private DNS server IP (no hostname — it's DNS!)
#   hosts_file: ./infra/dns/hosts.txt   # Local path or https:// URL
#   whitelist_file: https://internal.company.com/allowed.txt  # Optional
#   log_queries: true        # Default: true when host:false

# OPTIONAL: GitHub runner labels (must match your workflow's runs-on)
labels: [self-hosted, Linux, ARM64, container]

# OPTIONAL: Container resource limits
# Ensure Colima VM has enough memory: colima start --memory 16
resources:
  memory: 8g        # RAM limit (default: 8g)
  cpus: 4           # CPU limit (default: 4)
  pids: 2048        # Max processes (default: 2048)

# OPTIONAL: Per-job image override
# "base" = language image only (faster, smaller — good for lint/test/build)
# "full" = language + all tools listed above (needed for E2E, security scans)
# jobs:
#   lint: base
#   test: base
#   security: base
#   e2e: full
