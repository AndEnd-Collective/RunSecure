# ============================================================================
# Example GitHub Actions Workflow for RunSecure Runners
# ============================================================================
# Copy this to: .github/workflows/ci.yml in your project.
#
# This workflow runs on RunSecure containerized runners instead of
# GitHub-hosted or bare-metal self-hosted runners.
#
# Prerequisites:
#   1. RunSecure images built on your machine
#   2. .github/runner.yml in your project
#   3. RunSecure orchestrator running: ./infra/scripts/run.sh --project . --repo owner/repo
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# IMPORTANT: These labels must match your .github/runner.yml labels field.
# Default RunSecure labels: [self-hosted, Linux, ARM64, container]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: [self-hosted, Linux, ARM64, container]
    steps:
      - uses: actions/checkout@v4

      # Node.js is already in the image — no setup-node step needed.
      # If you keep setup-node, it will use the image's Node as a fallback.

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: [self-hosted, Linux, ARM64, container]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  build:
    name: Build
    runs-on: [self-hosted, Linux, ARM64, container]
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # E2E tests (only if you have Playwright/Cypress in your tools list)
  # e2e:
  #   name: E2E Tests
  #   runs-on: [self-hosted, Linux, ARM64, container]
  #   needs: [build]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: npm ci
  #     - run: npx playwright test
