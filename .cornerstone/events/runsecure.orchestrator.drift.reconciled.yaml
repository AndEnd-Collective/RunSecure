apiVersion: cornerstone.cerebras.net/v1
kind: EventSignature

metadata:
  name: runsecure.orchestrator.drift.reconciled
  uuid: 6f2a4b18-9c1d-4e3f-8a2b-1c5d7e9f0a1e
  description: |
    A4 drift detection: in-flight counter was reconciled against the docker
    containers list. event.details.error.data.delta carries the correction
    applied. Non-zero delta is informative, not alarming.
  status: active
  tags: [runsecure, orchestrator, defensive-A4]

signature:
  event.signature: runsecure-orchestrator-v1
  configuration:
    time.stamp: ISO 8601
    event.format: json
    event.structure: full
    single.line: true
  required_contexts:
    - audit_context
