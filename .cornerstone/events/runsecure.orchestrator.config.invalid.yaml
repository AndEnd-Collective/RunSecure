apiVersion: cornerstone.cerebras.net/v1
kind: EventSignature

metadata:
  name: runsecure.orchestrator.config.invalid
  uuid: 6f2a4b18-9c1d-4e3f-8a2b-1c5d7e9f0a21
  description: |
    Scope YAML or a project's runner.yml failed validation mid-flight. The
    offending file is named in event.details.error.data.path; the specific
    invariant violated in event.details.failure.reason.
  status: active
  tags: [runsecure, orchestrator, config]

signature:
  event.signature: runsecure-orchestrator-v1
  configuration:
    time.stamp: ISO 8601
    event.format: json
    event.structure: full
    single.line: true
  required_contexts: []
