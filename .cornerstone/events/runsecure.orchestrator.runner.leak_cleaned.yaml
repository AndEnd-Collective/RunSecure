apiVersion: cornerstone.cerebras.net/v1
kind: EventSignature

metadata:
  name: runsecure.orchestrator.runner.leak_cleaned
  uuid: 6f2a4b18-9c1d-4e3f-8a2b-1c5d7e9f0a19
  description: |
    A1 leak cleanup: a JIT-registered runner on GitHub was deleted because the
    matching container failed to start. Prevents accumulating "busy + offline"
