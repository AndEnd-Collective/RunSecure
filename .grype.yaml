# ============================================================================
# RunSecure — Grype Configuration
# ============================================================================
# Allowlist for vulnerabilities that we cannot fix directly because the
# affected component is vendored inside an upstream release we pin (most
# commonly: bundled npm packages inside the GitHub Actions runner tarball
# at externals/node20/lib/node_modules/).
#
# Every entry MUST include:
#   - the upstream that ships the vendored dep
#   - the pin in our code that controls the version
#   - the rationale for accepting the finding (what's the realistic blast
#     radius given how the runner uses the affected code path)
#   - a re-evaluation trigger
#
# Process for adding a new entry:
#   1. Confirm there's no upstream fix (we already pin past the fixed
#      version of our DIRECT deps).
#   2. Confirm the vulnerable code path's reachability and impact in our
#      threat model. RunSecure's runner is designed to execute untrusted
#      workflow code; CVEs in libraries the runner uses to run that
#      workflow are not exploit avenues that CHANGE the threat model.
#   3. Record the upstream tracking issue and the pin we update to clear it.
# ============================================================================

ignore:
  # --- Vendored npm packages inside actions-runner's externals/node20 -------
  # These ship bundled inside actions/runner v2.334.0 at:
  #   /home/runner/actions-runner/externals/node20/lib/node_modules/
  # GitHub's runner periodically bumps them via "chore: update Node versions"
  # commits — see release notes for actions/runner v2.334.0. Our upstream
  # pin is RUNNER_VERSION in images/base.Dockerfile.
  #
  # Re-evaluate whenever you bump RUNNER_VERSION — most of these clear
  # automatically when a new runner ships with bumped externals/.
  #
  # Reachability: these utilities run JS-action workflow code (which is
  # untrusted by design — that's what RunSecure is hardening). The CVEs
  # are mostly ReDoS / prototype-pollution in input-parsing helpers; an
  # attacker who can already run JS in our runner can already do worse
  # than trigger a regex-DoS in cross-spawn.

  - vulnerability: GHSA-3xgq-45jj-v275  # cross-spawn 7.0.3 ReDoS

  - vulnerability: GHSA-7r86-cg39-jmmj  # minimatch 9.0.5 ReDoS
  - vulnerability: GHSA-3ppc-4f35-3m26  # minimatch 9.0.5 prototype pollution
  - vulnerability: GHSA-23c5-xmqv-rm74  # minimatch 9.0.5 (additional advisory)

  - vulnerability: GHSA-5j98-mcp5-4vw2  # glob 10.4.2 (bundled dep update)

  - vulnerability: GHSA-c2c7-rcm5-vvqj  # picomatch 4.0.3 ReDoS

  - vulnerability: GHSA-34x7-hfp2-rc4v  # tar 6.2.1 — runner uses for action checkout
  - vulnerability: GHSA-r6q2-hw4h-h46w  # tar 6.2.1
  - vulnerability: GHSA-9ppj-qmqm-q256  # tar 6.2.1
  - vulnerability: GHSA-qffp-2rhf-9h96  # tar 6.2.1
  - vulnerability: GHSA-8qq5-rm4j-mr97  # tar 6.2.1
  - vulnerability: GHSA-83g3-92jg-28cx  # tar 6.2.1

  # --- docker/cli vendored inside the gh CLI binary ------------------------
  # The ONLY Go binary in the base image is /usr/bin/gh (the actions/runner is
  # .NET — it ships no Go binary). gh (GH_CLI_VERSION in images/base.Dockerfile)
  # vendors github.com/docker/cli; as of gh 2.95.0 the vendored version is
  # v29.4.3+incompatible, which is ALREADY PAST the v29.2.0+incompatible fix
  # for GO-2026-4610. Grype flags it anyway because it cannot order Go
  # "+incompatible" pseudo-versions and so treats 29.4.3 as < 29.2.0. This is
  # a false positive, not an unpatched dependency.
  # Re-evaluate when bumping GH_CLI_VERSION: drop this entry if a future gh
  # release stops vendoring docker/cli, or once Grype orders +incompatible
  # versions correctly.
  #
  # NOTE: the previous Go-stdlib ignores (CVE-2026-33811/33814/39820/39836/
  # 42499/42501) were removed — they were attributed to the runner but the
  # only Go binary is gh, and gh 2.95.0 is built with go1.26.4, which clears
  # every go-stdlib finding (no go-stdlib entry is needed anymore).
  - vulnerability: GO-2026-4610  # docker/cli 29.4.3 vendored in gh — already past the 29.2.0 fix; Grype +incompatible mis-order

  # --- undici bundled inside npm in the node image -------------------------
  # The node image installs Node.js (NODE_VERSION in images/node.Dockerfile)
  # from NodeSource, whose npm bundles undici transitively
  # (.../node_modules/npm/node_modules/undici). The node 24 line currently
  # ships undici 6.25.0; even npm@11.17.0 (latest) only bundles 6.26.0 —
  # neither reaches the 6.27.0 fix for CVE-2026-12151, so there is nothing
  # upstream to bump to yet.
  # Re-evaluate when a NodeSource node-24 release (or a global npm install)
  # bundles undici >= 6.27.0, then drop this entry.
  #
  # Reachability: CVE-2026-12151 is a DoS that requires the client to connect
  # to a MALICIOUS WebSocket server. npm never opens WebSockets to registries;
  # the only undici-WebSocket use would be untrusted workflow code, which is
  # exactly what this runner sandboxes (ephemeral, --pids-limit, --memory,
  # destroyed after one job).
  - vulnerability: GHSA-vxpw-j846-p89q  # undici 6.25.0 WebSocket DoS (CVE-2026-12151) — 6.27.0 fix not yet in any npm/node release

  # --- CPython CVEs flagged by Grype on the pinned 3.12 interpreter --------
  # The python image pins CPython 3.12.13 (PYTHON_VERSION in
  # images/python.Dockerfile) — the latest 3.12 from astral-sh/
  # python-build-standalone; there is no 3.12.14. Grype flags these because it
  # compares 3.12.13 against fixes that exist only in the 3.13/3.14 lines and
  # cannot reason across CPython minor branches:
  #   - CVE-2026-7210: affected 3.13.x/3.14.x/3.15 only (per NVD) — 3.12 is
  #     NOT in the affected range. Cross-branch false positive.
  #   - CVE-2026-4224: affected <3.10.0 and 3.13.0-3.13.12 / 3.14.0-3.14.3
  #     (a regression re-introduced in 3.13) — 3.12 is NOT affected. FP.
  #   - CVE-2026-3644: http.cookies follow-up to CVE-2026-0672; no 3.12 fix
  #     has shipped (no 3.12.14 exists), so there is nothing to upgrade to.
  # Re-evaluate when python-build-standalone ships a 3.12.x that Grype marks
  # fixed, or if the python image's minor is bumped to 3.13/3.14.
  #
  # Reachability: all three are DoS / parser issues (expat hash-flooding,
  # ElementDecl recursion, cookie control-char parsing) that require the
  # workflow to parse attacker-controlled XML/cookies. The runner executes
  # untrusted workflow code by design; a DoS of the ephemeral, resource-capped,
  # single-job container is not an escalation in this threat model.
  - vulnerability: CVE-2026-7210  # CPython expat hash-flooding DoS — 3.12 not in affected range (Grype cross-branch FP)
  - vulnerability: CVE-2026-4224  # CPython expat ElementDecl recursion — 3.12 not affected (Grype cross-branch FP)
  - vulnerability: CVE-2026-3644  # CPython http.cookies control-char parse — no 3.12 fix available to upgrade to
