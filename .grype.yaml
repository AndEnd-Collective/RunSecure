# ============================================================================
# RunSecure — Grype Configuration
# ============================================================================
# Allowlist for vulnerabilities that we cannot fix directly because the
# affected component is vendored inside an upstream release we pin (most
# commonly: bundled npm packages inside the GitHub Actions runner tarball
# at externals/node20/lib/node_modules/).
#
# Every entry MUST include:
#   - the upstream that ships the vendored dep
#   - the pin in our code that controls the version
#   - the rationale for accepting the finding (what's the realistic blast
#     radius given how the runner uses the affected code path)
#   - a re-evaluation trigger
#
# Process for adding a new entry:
#   1. Confirm there's no upstream fix (we already pin past the fixed
#      version of our DIRECT deps).
#   2. Confirm the vulnerable code path's reachability and impact in our
#      threat model. RunSecure's runner is designed to execute untrusted
#      workflow code; CVEs in libraries the runner uses to run that
#      workflow are not exploit avenues that CHANGE the threat model.
#   3. Record the upstream tracking issue and the pin we update to clear it.
# ============================================================================

ignore:
  # --- Vendored npm packages inside actions-runner's externals/node20 -------
  # These ship bundled inside actions/runner v2.334.0 at:
  #   /home/runner/actions-runner/externals/node20/lib/node_modules/
  # GitHub's runner periodically bumps them via "chore: update Node versions"
  # commits — see release notes for actions/runner v2.334.0. Our upstream
  # pin is RUNNER_VERSION in images/base.Dockerfile.
  #
  # Re-evaluate whenever you bump RUNNER_VERSION — most of these clear
  # automatically when a new runner ships with bumped externals/.
  #
  # Reachability: these utilities run JS-action workflow code (which is
  # untrusted by design — that's what RunSecure is hardening). The CVEs
  # are mostly ReDoS / prototype-pollution in input-parsing helpers; an
  # attacker who can already run JS in our runner can already do worse
  # than trigger a regex-DoS in cross-spawn.

  - vulnerability: GHSA-3xgq-45jj-v275  # cross-spawn 7.0.3 ReDoS

  - vulnerability: GHSA-7r86-cg39-jmmj  # minimatch 9.0.5 ReDoS
  - vulnerability: GHSA-3ppc-4f35-3m26  # minimatch 9.0.5 prototype pollution
  - vulnerability: GHSA-23c5-xmqv-rm74  # minimatch 9.0.5 (additional advisory)

  - vulnerability: GHSA-5j98-mcp5-4vw2  # glob 10.4.2 (bundled dep update)

  - vulnerability: GHSA-c2c7-rcm5-vvqj  # picomatch 4.0.3 ReDoS

  - vulnerability: GHSA-34x7-hfp2-rc4v  # tar 6.2.1 — runner uses for action checkout
  - vulnerability: GHSA-r6q2-hw4h-h46w  # tar 6.2.1
  - vulnerability: GHSA-9ppj-qmqm-q256  # tar 6.2.1
  - vulnerability: GHSA-qffp-2rhf-9h96  # tar 6.2.1
  - vulnerability: GHSA-8qq5-rm4j-mr97  # tar 6.2.1
  - vulnerability: GHSA-83g3-92jg-28cx  # tar 6.2.1

  # --- Go stdlib inside the actions/runner v2.334.0 binary -----------------
  # actions/runner v2.334.0 (2026-04-21) was compiled with go1.26.2. The Go
  # team patched the stdlib in go1.25.10 / go1.26.3 (2026-05-01) for the
  # CVEs below. actions/runner has not yet shipped a release rebuilt against
  # the patched toolchain — once a v2.335.x lands, bump RUNNER_VERSION in
  # images/base.Dockerfile and remove these entries.
  # Tracking: https://github.com/actions/runner/releases
  #
  # Reachability: the runner uses Go only for its own process management
  # (worker spawning, IPC, log forwarding). The vulnerable code paths
  # (net/http, crypto/x509, encoding/* in Go stdlib) are not in the runner's
  # hot path for executing workflow code; impact is limited to the runner's
  # own control plane, which only talks to api.github.com over a pinned cert.
  - vulnerability: CVE-2026-33811  # go stdlib
  - vulnerability: CVE-2026-33814  # go stdlib
  - vulnerability: CVE-2026-39820  # go stdlib
  - vulnerability: CVE-2026-39836  # go stdlib
  - vulnerability: CVE-2026-42499  # go stdlib
  - vulnerability: CVE-2026-42501  # go stdlib
